name: cloudflared

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    networks:
      - dj_network
    healthcheck:
      test: ["CMD", "cloudflared", "--version"]
      interval: 1m
      timeout: 10s
      retries: 3

networks:
  dj_network:
    external: true
    # Network compartilhada com datajoin-app e datajoin-airflow (convenção
    # do CLAUDE.md desses dois repos). Cria com: docker network create dj_network
